<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="verify-admitad" content="2b9b5f010e" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusForge.Shop – Premium Store</title>
<meta name="description" content="FocusForge.Shop – Suomen monipuolisin verkkokauppaalusta. B2C, C2C ja B2B yhdessä paikassa. Nopea toimitus, turvallinen maksaminen.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --night:#0d1b2a;
  --fjord:#162840;
  --navy:#1e3a54;
  --sky:#5BB8F5;
  --blue:#2E8DC8;
  --snow:#f4f8fc;
  --ice:#dce8f0;
  --mist:#8ab4cc;
  --sun:#F4A261;
  --green:#22c77a;
  --red:#e84545;
  --text:#0d1b2a;
  --text2:#3a6a8a;
  --text3:#6b8fa8;
  --serif:'Playfair Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --r:10px;
  --sh:0 2px 16px rgba(13,27,42,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--snow);color:var(--text);min-height:100vh}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:var(--sans)}
img{display:block;max-width:100%}

/* ─── HEADER ─── */
.hdr{background:var(--night);position:sticky;top:0;z-index:100;box-shadow:0 2px 24px rgba(0,0,0,.3)}
.hdr-top{display:flex;align-items:center;gap:12px;padding:0 1.5rem;height:60px}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;flex-shrink:0}
.logo-icon{width:38px;height:38px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{width:20px;height:20px}
.logo-text{display:flex;flex-direction:column;line-height:1}
.logo-nordic{font-family:var(--serif);font-size:19px;font-weight:700;color:#fff;letter-spacing:-.4px}
.logo-shop{font-size:9px;font-weight:500;color:var(--sky);letter-spacing:3.5px;text-transform:uppercase;margin-top:1px}
.hdr-search{flex:1;position:relative;max-width:520px}
.hdr-search input{width:100%;height:38px;background:#1e3a54;border:1px solid #2a4f6e;border-radius:9px;padding:0 14px 0 38px;font-size:13.5px;font-family:var(--sans);color:#e8f4fc;outline:none;transition:border-color .2s,background .2s}
.hdr-search input:focus{background:#234460;border-color:var(--sky)}
.hdr-search input::placeholder{color:var(--mist)}
.hdr-search .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--mist);pointer-events:none}
.hdr-actions{display:flex;gap:8px;flex-shrink:0;margin-left:auto}
.ha-btn{background:var(--fjord);border:1px solid #2a4f6e;border-radius:9px;height:38px;padding:0 14px;color:#c8e0ee;font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px;transition:background .15s,border-color .15s;position:relative;white-space:nowrap}
.ha-btn:hover{background:var(--navy);border-color:var(--sky)}
.ha-btn svg{width:16px;height:16px;flex-shrink:0}
.ha-btn.primary{background:linear-gradient(135deg,var(--sky),var(--blue));color:var(--night);border-color:transparent;font-weight:600}
.ha-btn.primary:hover{filter:brightness(1.08)}
.badge{position:absolute;top:-6px;right:-6px;background:var(--sun);color:var(--night);border-radius:99px;min-width:18px;height:18px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--night)}
.dot-badge{position:absolute;top:-3px;right:-3px;width:9px;height:9px;background:var(--red);border-radius:50%;border:2px solid var(--night)}
.hdr-nav{background:var(--fjord);border-top:1px solid #1e3a54;display:flex;padding:0 1.5rem;overflow-x:auto;scrollbar-width:none}
.hdr-nav::-webkit-scrollbar{display:none}
.nav-btn{background:none;border:none;border-bottom:2px solid transparent;color:var(--mist);padding:9px 14px;font-size:12.5px;font-family:var(--sans);white-space:nowrap;transition:all .15s}
.nav-btn:hover{color:#c8e0ee}
.nav-btn.on{border-bottom-color:var(--sky);color:var(--sky);font-weight:600}

/* ─── LAYOUT ─── */
.page{padding:1.5rem}
.page-narrow{max-width:640px}
.back-btn{background:none;border:none;font-size:13px;color:var(--text3);display:flex;align-items:center;gap:5px;margin-bottom:1.25rem;padding:0;font-family:var(--sans)}
.back-btn:hover{color:var(--text2)}
.sec-title{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--night);letter-spacing:-.3px;margin-bottom:.25rem}
.sec-sub{font-size:12px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:1px solid var(--ice)}

/* ─── HERO ─── */
.hero{background:linear-gradient(135deg,var(--night) 0%,#0a2233 60%,#0d2d44 100%);border-radius:16px;padding:2rem 2.5rem;margin-bottom:1.5rem;position:relative;overflow:hidden;display:flex;justify-content:space-between;align-items:center}
.hero::before{content:'';position:absolute;top:-60px;right:-60px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(91,184,245,.12) 0%,transparent 70%)}
.hero::after{content:'';position:absolute;bottom:-40px;left:30%;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(46,141,200,.08) 0%,transparent 70%)}
.hero-content{position:relative;z-index:1}
.hero-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(91,184,245,.15);border:1px solid rgba(91,184,245,.25);border-radius:99px;padding:4px 12px;font-size:11px;font-weight:500;color:var(--sky);margin-bottom:.875rem;letter-spacing:.3px}
.hero h1{font-family:var(--serif);font-size:32px;font-weight:800;color:#fff;letter-spacing:-.8px;line-height:1.15;margin-bottom:.625rem}
.hero h1 em{color:var(--sky);font-style:normal}
.hero p{font-size:14px;color:var(--mist);margin-bottom:1.25rem;line-height:1.6;max-width:340px}
.hero-badges{display:flex;gap:8px;flex-wrap:wrap}
.hbadge{border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600}
.hbadge.b2c{background:rgba(91,184,245,.2);color:var(--sky)}
.hbadge.c2c{background:rgba(34,199,122,.2);color:#22c77a}
.hbadge.b2b{background:rgba(244,162,97,.2);color:var(--sun)}
.hero-emoji{font-size:72px;position:relative;z-index:1;filter:drop-shadow(0 8px 24px rgba(91,184,245,.3))}
.hero-stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.hstat{background:var(--night);border:1px solid #1e3a54;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px}
.hstat-icon{font-size:20px}
.hstat-v{font-size:14px;font-weight:600;color:var(--text)}
.hstat-l{font-size:11px;color:var(--text3)}

/* ─── CATS ─── */
.cats-wrap{position:relative;display:flex;align-items:center;margin-bottom:1.5rem;gap:4px}
.cats-arrow{flex-shrink:0;width:32px;height:32px;border-radius:50%;background:#fff;border:1px solid var(--ice);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--sh);transition:all .15s;color:var(--text2);font-size:14px}
.cats-arrow:hover{background:var(--night);color:#fff;border-color:var(--night)}
.cats-arrow:disabled{opacity:.3;cursor:default;pointer-events:none}
.cats{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;flex:1}
.cats::-webkit-scrollbar{display:none}
.cat-btn{flex-shrink:0;border:1px solid var(--ice);border-radius:99px;padding:6px 16px;font-size:12.5px;font-family:var(--sans);background:#fff;color:var(--text2);transition:all .15s;white-space:nowrap}
.cat-btn:hover{border-color:var(--blue);color:var(--blue)}
.cat-btn.on{background:var(--night);color:#fff;border-color:var(--night);font-weight:500}

/* ─── SORT CHIPS ─── */
.sort-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:8px;flex-wrap:wrap}
.sort-chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{border:1px solid var(--ice);border-radius:6px;padding:5px 11px;font-size:12px;font-family:var(--sans);background:#fff;color:var(--text3);transition:all .15s}
.chip.on{background:var(--night);color:#fff;border-color:var(--night)}
.results-lbl{font-size:12.5px;color:var(--text3)}

/* ─── PRODUCT GRID ─── */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.pcard{background:#fff;border:1px solid var(--ice);border-radius:14px;overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .2s;box-shadow:var(--sh)}
.pcard:hover{box-shadow:0 8px 32px rgba(13,27,42,.14);transform:translateY(-2px)}
.pc-img{height:150px;overflow:hidden;background:var(--snow);position:relative}
.pc-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.pcard:hover .pc-img img{transform:scale(1.06)}
.pc-badge{position:absolute;top:9px;left:9px;border-radius:6px;padding:3px 8px;font-size:10.5px;font-weight:700;background:var(--sun);color:var(--night);z-index:2}
.pc-badge-ali{background:linear-gradient(135deg,#e8472a,#ff6a00)!important;color:#fff!important}
.pc-badge-asos{background:#000!important;color:#fff!important}
.pc-badge-mavely{background:linear-gradient(135deg,#3730a3,#6d28d9)!important;color:#fff!important}
.pc-sold{position:absolute;inset:0;background:rgba(13,27,42,.45);display:flex;align-items:center;justify-content:center;z-index:2}
.pc-sold span{color:#fff;font-size:12px;font-weight:600;letter-spacing:.3px}
.pc-wish{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.92);backdrop-filter:blur(4px);border:none;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;z-index:3;font-size:14px;transition:transform .15s}
.pc-wish:hover{transform:scale(1.2)}
.pc-body{padding:12px}
.pc-seller-row{display:flex;align-items:center;gap:4px;margin-bottom:5px;overflow:hidden}
.pc-stype{font-size:10.5px;font-weight:600;flex-shrink:0}
.pc-sname{font-size:10.5px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pc-name{font-size:13.5px;font-weight:600;color:var(--text);margin-bottom:5px;line-height:1.3;font-family:var(--sans)}
.pc-stars{display:flex;align-items:center;gap:3px;margin-bottom:7px}
.pc-rv{font-size:11.5px;font-weight:600;color:var(--text)}
.pc-rc{font-size:11px;color:var(--text3)}
.pc-price-row{display:flex;align-items:baseline;gap:6px;margin-bottom:10px}
.pc-price{font-size:16px;font-weight:700;color:var(--night)}
.pc-orig{font-size:11.5px;color:var(--text3);text-decoration:line-through}
.pc-add{width:100%;padding:8px 0;border:none;border-radius:8px;font-size:12.5px;font-weight:600;font-family:var(--sans);transition:all .15s}
.pc-add.av{background:var(--night);color:#fff}
.pc-add.av:hover{background:var(--fjord)}
.pc-add.na{background:var(--snow);color:var(--text3);cursor:not-allowed}

/* ─── PRODUCT DETAIL ─── */
.pd-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin-bottom:2rem}
.pd-img-wrap{border-radius:14px;overflow:hidden;background:var(--snow);aspect-ratio:1/1;max-height:480px}
.pd-img-wrap img{width:100%;height:100%;object-fit:contain}
.pd-tag-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.tag{display:inline-block;border-radius:6px;padding:3px 10px;font-size:11px;font-weight:600}
.tag.b2c{background:rgba(91,184,245,.15);color:var(--blue)}
.tag.c2c{background:rgba(34,199,122,.15);color:#19a464}
.tag.b2b{background:rgba(244,162,97,.15);color:#c0621a}
.tag.cat{background:var(--snow);color:var(--text3);border:1px solid var(--ice)}
.tag.badge-tag{background:rgba(244,162,97,.2);color:#c05a10}
.pd-title{font-family:var(--serif);font-size:26px;font-weight:700;color:var(--night);letter-spacing:-.5px;margin-bottom:10px;line-height:1.2}
.pd-stars{display:flex;align-items:center;gap:5px;margin-bottom:14px}
.pd-price{font-size:28px;font-weight:700;color:var(--night);font-family:var(--serif);margin-bottom:3px}
.pd-orig{font-size:13.5px;color:var(--text3);text-decoration:line-through;margin-bottom:12px}
.pd-stock{font-size:13px;font-weight:600;margin-bottom:16px}
.in-s{color:var(--green)}.out-s{color:var(--red)}
.qty-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.qty-label{font-size:12.5px;color:var(--text3);font-weight:500}
.qty-ctrl{display:flex;align-items:center;gap:0;border:1px solid var(--ice);border-radius:9px;overflow:hidden}
.qty-btn{width:34px;height:34px;background:none;border:none;font-size:18px;color:var(--text);display:flex;align-items:center;justify-content:center;transition:background .15s}
.qty-btn:hover{background:var(--snow)}
.qty-val{width:34px;text-align:center;font-size:14px;font-weight:600;color:var(--text)}
.big-btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:14px;font-weight:600;font-family:var(--sans);transition:all .15s;margin-bottom:9px}
.big-btn.primary{background:var(--night);color:#fff}
.big-btn.primary:hover{background:var(--fjord)}
.big-btn.outline{background:#fff;border:1.5px solid var(--ice);color:var(--text)}
.big-btn.outline:hover{border-color:var(--night);background:var(--snow)}
.big-btn.sky{background:linear-gradient(135deg,var(--sky),var(--blue));color:var(--night)}
.pd-desc-box{margin-bottom:1.5rem}
.pd-desc-box p{font-size:14px;color:var(--text2);line-height:1.75}
.seller-card{background:var(--snow);border:1px solid var(--ice);border-radius:12px;padding:14px;cursor:pointer;transition:border-color .15s;margin-bottom:1.5rem}
.seller-card:hover{border-color:var(--blue)}
.sa-row{display:flex;align-items:center;gap:12px}
.s-av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.rev-item{background:var(--snow);border:1px solid var(--ice);border-radius:10px;padding:14px;margin-bottom:9px}
.rev-top{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.rev-av{width:30px;height:30px;border-radius:50%;background:#fff;border:1px solid var(--ice);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text3);flex-shrink:0}
.rev-n{font-size:13px;font-weight:600;color:var(--text)}
.rev-d{font-size:11px;color:var(--text3)}
.rev-txt{font-size:13px;color:var(--text2);line-height:1.55}
.rev-form{background:var(--snow);border:1px solid var(--ice);border-radius:12px;padding:16px;margin-top:14px}
.star-pick{display:flex;gap:5px;margin-bottom:10px}
.star-pick button{background:none;border:none;font-size:24px;transition:transform .1s}
.star-pick button:hover{transform:scale(1.2)}

/* ─── SELLER PAGE ─── */
.sel-hero-box{background:linear-gradient(135deg,var(--night),var(--fjord));border-radius:14px;padding:1.75rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:1.25rem}
.sel-stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
.sel-stat{background:#fff;border:1px solid var(--ice);border-radius:10px;padding:12px;text-align:center;box-shadow:var(--sh)}
.sel-stat-v{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--night)}
.sel-stat-l{font-size:11px;color:var(--text3);margin-top:2px}
.sel-desc-box{background:var(--snow);border:1px solid var(--ice);border-radius:10px;padding:14px;margin-bottom:1.25rem;font-size:13.5px;color:var(--text2);line-height:1.65}

/* ─── CART PANEL ─── */
#cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;backdrop-filter:blur(2px)}
#cart-panel{position:fixed;top:0;right:0;height:100vh;width:340px;background:#fff;z-index:201;display:flex;flex-direction:column;box-shadow:-8px 0 40px rgba(0,0,0,.2)}
.cp-hdr{padding:18px 20px;border-bottom:1px solid var(--ice);display:flex;align-items:center;justify-content:space-between}
.cp-title{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--night)}
.cp-close{background:none;border:none;font-size:20px;color:var(--text3);line-height:1}
.cp-items{flex:1;overflow-y:auto;padding:12px}
.cp-empty{text-align:center;padding:3rem 1rem;color:var(--text3)}
.cp-empty-icon{font-size:44px;margin-bottom:10px}
.c-item{display:flex;gap:10px;padding:12px;background:var(--snow);border-radius:10px;margin-bottom:8px}
.ci-img{width:44px;height:44px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--ice)}
.ci-img img{width:100%;height:100%;object-fit:cover}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.ci-sel{font-size:11px;color:var(--text3);margin-bottom:5px}
.ci-bot{display:flex;align-items:center;justify-content:space-between}
.ci-price{font-size:13px;font-weight:700;color:var(--night)}
.ci-rm{background:none;border:none;font-size:11.5px;color:var(--red);font-family:var(--sans)}
.cp-foot{padding:16px 20px;border-top:1px solid var(--ice)}
.cp-tot-row{display:flex;justify-content:space-between;margin-bottom:14px}
.cp-tot-l{font-size:13.5px;color:var(--text3)}
.cp-tot-v{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--night)}
.cp-chk-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--sky),var(--blue));color:var(--night);border:none;border-radius:10px;font-size:14px;font-weight:700;font-family:var(--sans)}

/* ─── MODAL ─── */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal-box{background:#fff;border-radius:18px;padding:2rem;width:360px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-title{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--night);margin-bottom:4px}
.modal-sub{font-size:13px;color:var(--text3);margin-bottom:1.25rem}
.modal-close{float:right;background:none;border:none;font-size:20px;color:var(--text3);margin-top:-4px}
.auth-tabs{display:flex;border:1px solid var(--ice);border-radius:9px;overflow:hidden;margin-bottom:1.25rem}
.auth-tab{flex:1;padding:8px 0;border:none;background:none;font-size:13.5px;font-family:var(--sans);color:var(--text3);transition:all .15s}
.auth-tab.on{background:var(--night);color:#fff;font-weight:600}

/* ─── FORMS ─── */
.flbl{font-size:12.5px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block}
.finp{width:100%;height:40px;padding:0 13px;border:1.5px solid var(--ice);border-radius:9px;font-size:13.5px;font-family:var(--sans);color:var(--text);background:#fff;outline:none;margin-bottom:13px;transition:border-color .2s}
.finp:focus{border-color:var(--sky)}
.fsel{width:100%;height:40px;padding:0 13px;border:1.5px solid var(--ice);border-radius:9px;font-size:13.5px;font-family:var(--sans);color:var(--text);background:#fff;outline:none;margin-bottom:13px;appearance:none}
.ftarea{width:100%;padding:11px 13px;border:1.5px solid var(--ice);border-radius:9px;font-size:13.5px;font-family:var(--sans);color:var(--text);background:#fff;outline:none;margin-bottom:13px;resize:vertical;min-height:90px;line-height:1.5}
.ftarea:focus{border-color:var(--sky)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-btn{width:100%;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;font-family:var(--sans);transition:all .15s;margin-top:4px}
.form-btn.dark{background:var(--night);color:#fff}
.form-btn.dark:hover{background:var(--fjord)}
.form-btn.sky{background:linear-gradient(135deg,var(--sky),var(--blue));color:var(--night)}

/* ─── CHECKOUT ─── */
.ck-steps{display:flex;margin-bottom:1.5rem}
.ck-step{flex:1;text-align:center;padding:9px 0;border-bottom:2.5px solid var(--ice);font-size:12.5px;font-weight:500;color:var(--text3);transition:all .2s}
.ck-step.done{border-bottom-color:var(--green);color:var(--green)}
.ck-step.active{border-bottom-color:var(--night);color:var(--night);font-weight:700}
.pay-opt{display:flex;align-items:center;gap:12px;padding:14px;border:1.5px solid var(--ice);border-radius:10px;cursor:pointer;background:#fff;margin-bottom:9px;transition:border-color .15s}
.pay-opt.sel{border-color:var(--night);background:var(--snow)}
.pay-opt-name{font-size:13.5px;font-weight:600;color:var(--text)}
.pay-opt-sub{font-size:11.5px;color:var(--text3)}
.order-sum{background:var(--snow);border:1px solid var(--ice);border-radius:12px;padding:14px;margin-bottom:1.25rem}
.order-sum-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--ice)}
.osm-img{width:40px;height:40px;border-radius:7px;overflow:hidden;flex-shrink:0;background:var(--ice)}
.osm-img img{width:100%;height:100%;object-fit:cover}
.order-total-row{display:flex;justify-content:space-between;align-items:baseline;padding:10px 0 0;font-size:15px;font-weight:700;color:var(--night)}

/* ─── ORDERS ─── */
.order-card{background:#fff;border:1px solid var(--ice);border-radius:14px;padding:1.25rem;margin-bottom:12px;box-shadow:var(--sh)}
.ord-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.ord-id{font-size:13.5px;font-weight:700;color:var(--text)}
.ord-date{font-size:11.5px;color:var(--text3)}
.ord-status{font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:6px}
.st-p{background:#fef3c7;color:#92400e}
.st-s{background:rgba(91,184,245,.15);color:var(--blue)}
.st-d{background:rgba(34,199,122,.15);color:#19a464}
.oi-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--ice)}
.oi-img{width:40px;height:40px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--snow)}
.oi-img img{width:100%;height:100%;object-fit:cover}

/* ─── MESSAGES ─── */
.conv-list{display:flex;flex-direction:column;gap:3px}
.conv-item{background:#fff;border:1px solid var(--ice);border-radius:11px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:border-color .15s,box-shadow .15s}
.conv-item:hover{border-color:var(--sky);box-shadow:var(--sh)}
.conv-item.unread{border-left:3px solid var(--sky)}
.conv-av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.conv-name{font-size:13.5px;font-weight:600;color:var(--text);margin-bottom:2px}
.conv-prev{font-size:12.5px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.conv-time{font-size:11px;color:var(--text3);flex-shrink:0}
.chat-area{background:var(--snow);border:1px solid var(--ice);border-radius:12px;padding:14px;min-height:200px;margin-bottom:10px;display:flex;flex-direction:column;gap:10px}
.msg-bubble{max-width:72%;padding:10px 13px;border-radius:13px;font-size:13.5px;line-height:1.5}
.msg-me{align-self:flex-end;background:var(--night);color:#fff;border-bottom-right-radius:4px}
.msg-them{align-self:flex-start;background:#fff;border:1px solid var(--ice);color:var(--text);border-bottom-left-radius:4px}
.msg-time{font-size:10px;opacity:.55;margin-top:3px;text-align:right}
.chat-inp-row{display:flex;gap:9px}
.chat-inp{flex:1;height:40px;padding:0 13px;border:1.5px solid var(--ice);border-radius:9px;font-size:13.5px;font-family:var(--sans);color:var(--text);background:#fff;outline:none}
.chat-inp:focus{border-color:var(--sky)}
.chat-send{height:40px;padding:0 18px;background:var(--night);color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:600;font-family:var(--sans)}

/* ─── NOTIFICATIONS ─── */
.ntf-item{background:#fff;border:1px solid var(--ice);border-radius:11px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.ntf-item:hover{border-color:var(--sky)}
.ntf-item.unread{border-left:3px solid var(--sky)}
.ntf-icon{font-size:24px;flex-shrink:0;margin-top:1px}
.ntf-title{font-size:13.5px;font-weight:600;color:var(--text);margin-bottom:2px}
.ntf-sub{font-size:12.5px;color:var(--text2);line-height:1.45}
.ntf-time{font-size:11px;color:var(--text3);margin-top:4px}
.ntf-dot{width:9px;height:9px;background:var(--sky);border-radius:50%;flex-shrink:0;margin-top:5px}

/* ─── DASHBOARD ─── */
.dash-kpi{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:1.25rem}
.kpi-card{background:#fff;border:1px solid var(--ice);border-radius:12px;padding:16px;box-shadow:var(--sh)}
.kpi-lbl{font-size:11.5px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.kpi-val{font-family:var(--serif);font-size:26px;font-weight:700;color:var(--night);margin-bottom:3px}
.kpi-chg{font-size:11.5px;font-weight:600}
.kpi-chg.up{color:var(--green)}.kpi-chg.dn{color:var(--red)}
.kpi-bar{height:5px;background:var(--snow);border-radius:3px;margin-top:10px;overflow:hidden}
.kpi-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--sky),var(--blue))}
.list-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--ice)}
.list-row:last-child{border-bottom:none}
.list-img{width:46px;height:46px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--snow)}

/* ─── LISTING FORM ─── */
.img-picker{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:14px}
.img-pick-cell{height:56px;border-radius:8px;overflow:hidden;cursor:pointer;border:2.5px solid transparent;transition:border-color .15s}
.img-pick-cell.sel{border-color:var(--sky)}
.img-pick-cell img{width:100%;height:100%;object-fit:cover}

/* ─── SUCCESS ─── */
.success-box{text-align:center;padding:3.5rem 1.5rem}
.success-icon{font-size:60px;margin-bottom:14px;animation:pop .4s ease}
@keyframes pop{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.success-title{font-family:var(--serif);font-size:26px;font-weight:700;color:var(--night);margin-bottom:8px}
.success-sub{font-size:14px;color:var(--text3);line-height:1.6;margin-bottom:24px}
.success-btn{background:var(--night);color:#fff;border:none;border-radius:10px;padding:12px 28px;font-size:14px;font-weight:600;font-family:var(--sans);margin:0 5px}

/* ─── BOTTOM NAV ─── */
.bnav{background:#fff;border-top:1px solid var(--ice);display:flex;position:sticky;bottom:0;z-index:50}
.bnav-btn{flex:1;background:none;border:none;padding:10px 0 9px;font-family:var(--sans);display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10.5px;color:var(--text3);transition:color .15s;position:relative}
.bnav-btn.on{color:var(--night);font-weight:600}
.bnav-btn svg{width:21px;height:21px}
.bnav-badge{position:absolute;top:7px;left:calc(50% + 3px);width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid #fff}

/* ─── EMPTY STATES ─── */
.empty-st{text-align:center;padding:3rem 1rem;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:5px}
.empty-sub{font-size:13px;margin-bottom:18px}
.empty-btn{background:var(--night);color:#fff;border:none;border-radius:9px;padding:10px 24px;font-size:13.5px;font-weight:600;font-family:var(--sans)}

/* ─── TRUST BAR ─── */
.trust-bar{background:var(--night);padding:.875rem 1.5rem;display:flex;gap:24px;overflow-x:auto;scrollbar-width:none}
.trust-bar::-webkit-scrollbar{display:none}
.trust-item{display:flex;align-items:center;gap:8px;flex-shrink:0;font-size:12px;color:var(--mist)}
.trust-item svg{width:15px;height:15px;color:var(--sky);flex-shrink:0}

/* ─── RESPONSIVE ─── */
@media(max-width:640px){

  .hero{padding:1.25rem}
  .hero h1{font-size:24px}
  .hero-emoji{font-size:52px}
  .hero-stat-row{grid-template-columns:1fr 1fr}
  .hstat:last-child{display:none}
  .pgrid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
  #cart-panel{width:100%}
  .frow{grid-template-columns:1fr}
  .dash-kpi{grid-template-columns:1fr}
}
.aff-overlay{position:fixed;inset:0;z-index:9999;background:rgba(10,22,40,0.82);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}

      ${isL?'Kirjaudu sisään →':'Luo tili ilmaiseksi →'}
    </button>
    <div style="font-size:12.5px;color:var(--text3);text-align:center;margin-top:12px">
      ${isL?`Ei tiliä? <button onclick="S.modal='register';renderAll()" style="background:none;border:none;cursor:pointer;color:var(--blue);font-family:var(--sans);font-size:12.5px">Rekisteröidy</button>`:`Minulla on jo tili. <button onclick="S.modal='login';renderAll()" style="background:none;border:none;cursor:pointer;color:var(--blue);font-family:var(--sans);font-size:12.5px">Kirjaudu</button>`}
    </div>
  </div>`;
}

  const msgUnread=S.convs.filter(x=>x.unread).length;
  const pages=[
    {k:'home',l:'Etusivu',icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`},
    {k:'messages',l:'Viestit',icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`,badge:msgUnread>0},
    {k:'wishlist',l:'Toivelista',icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`},
    {k:'orders',l:'Tilaukset',icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`},
    {k:'dashboard',l:'Paneeli',icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`},
  ];
  $('bnav-root').innerHTML=`<nav class="bnav">${pages.map(p=>`<button class="bnav-btn${S.page===p.k?' on':''}" onclick="navigate('${p.k}')">${p.icon}${p.l}${p.badge?`<span class="bnav-badge"></span>`:''}</button>`).join('')}</nav>`;
}

/* ══════════════ MASTER RENDER ══════════════ */
function buyCurrentProduct(){
  const p = window._currentP;
  if(!p || !p.affiliateUrl) return;
  showAffiliateRedirect(p.affiliateUrl, p.name, p.seller, p.imgs?p.imgs[0]:p.img);
}
function showAffiliateRedirect(url, productName, sellerName, imgUrl) {
  const ov = document.createElement('div');
  ov.className = 'aff-overlay';
  ov.id = 'aff-ov';
  ov.innerHTML = `
    <div class="aff-modal">
      <div class="aff-logo">🛍️ <span>FocusForge</span>.Shop</div>
      <img class="aff-prod-img" src="${imgUrl}" onerror="this.style.display='none'">
      <div class="aff-title">${productName}</div>
      <div class="aff-seller">Myyjä: ${sellerName}</div>
      <div class="aff-info">🔒 FocusForge.Shop ohjaa sinut nyt turvallisesti kauppiaan sivulle ostoa varten. Palataksesi paina selaimen Takaisin-painiketta.</div>
      <div class="aff-bar-wrap"><div class="aff-bar" id="aff-progress"></div></div>
      <a class="aff-btn" id="aff-go" href="${url}" target="_blank" rel="noopener sponsored">🛍️ Siirry ostamaan nyt →</a>
      <button class="aff-cancel" onclick="document.getElementById('aff-ov').remove()">✕ Peruuta</button>
    </div>`;
  document.body.appendChild(ov);
  ov.addEventListener('click', e => { if(e.target===ov) ov.remove(); });
  setTimeout(() => {
    const bar = document.getElementById('aff-progress');
    if(bar) bar.style.width = '100%';
  }, 50);
  setTimeout(() => {
    const btn = document.getElementById('aff-go');
    if(btn) { btn.click(); ov.remove(); }
  }, 2500);
}

function renderAll(){
  renderHeader();
  const pg=S.page;
  if(pg==='home')renderHome();
  else if(pg==='product')renderProduct();
  else if(pg==='seller')renderSeller();
  else if(pg==='wishlist')renderWishlist();
  else if(pg==='messages')renderMessages();
  else if(pg==='notifications')renderNotifications();
  else if(pg==='orders')renderOrders();
  else if(pg==='checkout')renderCheckout();
  else if(pg==='list')renderListing();
  else if(pg==='dashboard')renderDashboard();
  renderCart();renderModal();renderBnav();
}

renderAll();
</script>
